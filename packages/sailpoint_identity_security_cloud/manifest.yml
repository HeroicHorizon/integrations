format_version: 3.3.0
name: sailpoint_identity_security_cloud
title: Sailpoint Identity Security Cloud
version: 0.0.1
source:
  license: "Elastic-2.0"
description: "Sailpoint Identity Security Cloud provides enterprise identity governance and security capabilities. The integration is designed to give users the ability to extract audit information from their Identity Security Cloud tenant using ISC's AuditEvent API."
type: integration
categories:
  - custom
conditions:
  kibana:
    version: "^8.16.1"
  elastic:
    subscription: "basic"
screenshots:
  - src: /img/sample-screenshot.png
    title: Sample screenshot
    size: 600x600
    type: image/png
icons:
  - src: /img/sample-logo.svg
    title: Sample logo
    size: 32x32
    type: image/svg+xml
policy_templates:
  - name: sailpoint_identity_security_cloud
    title: Sailpoint Identity Security Cloud Events
    description: Collect events from Sailpoint Identity Security Cloud event reporting
    inputs:
      - type: cel
        title: Collect events from Sailpoint Identity Security Cloud events API
        description: Collect all events from Sailpoint Identity Security Cloud via API
        vars:
          - name: api_host
            type: text
            title: URL of Sailpoint Identity Security Cloud host API Server
            description: URL of Sailpoint Identity Security Cloud host API Server, e.g., https://{tenant}.api.identitynow-demo.com/
            show_user: true
            required: true
          - name: client_id
            type: text
            title: Client ID of Sailpoint Identity Security Cloud
            description: "This is the Client ID you have created on Sailpoint Identity Security Cloud."
            show_user: true
            required: true
            secret: true
          - name: client_secret
            type: text
            title: Client Secret of Sailpoint Identity Security Cloud Events API Server
            description: "This is the Client Secret obtained from Sailpoint Identity Security Cloud."
            show_user: true
            required: true
            secret: true
          - name: enable_request_tracer
            type: bool
            title: Enable Request Tracing
            multi: false
            required: false
            show_user: false
            description: The request tracer logs requests and responses to the agent's local filesystem for debugging configurations. Enabling this request tracing compromises security and should only be used for debugging. See the [documentation](https://www.elastic.co/guide/en/beats/filebeat/current/filebeat-input-httpjson.html#_request_tracer_filename) for details.
          - name: http_client_timeout
            type: text
            title: HTTP Client Timeout
            description: Duration before declaring that the HTTP client connection has timed out. Valid time units are ns, us, ms, s, m, h.
            multi: false
            required: false
            show_user: true
          - name: proxy_url
            type: text
            title: Proxy URL
            description: URL to proxy connections in the form of http[s]://<user>:<password>@<server name/ip>:<port>
            multi: false
            required: false
            show_user: false
          - name: ssl
            type: yaml
            title: SSL Configuration
            description: Includes certificate authorities, supported protocols, verification mode, etc.
            multi: false
            required: false
            show_user: false
owner:
  github: elastic/security-service-integrations
  type: elastic
