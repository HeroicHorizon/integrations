---
description: Pipeline for processing sailpoint identity security cloud events
processors:
  - rename:
      field: message
      target_field: sailpoint_identity_security_cloud.event

  - fingerprint:
      fields:
        - sailpoint_identity_security_cloud.event.id
      target_field: "_id"

##################### Scripts for processing input #####################
  - script:
      description: Drops null/empty values recursively.
      lang: painless
      source: |
        boolean dropEmptyFields(Object object) {
          if (object == null || object == "") {
            return true;
          } else if (object instanceof Map) {
            ((Map) object).values().removeIf(value -> dropEmptyFields(value));
            return (((Map) object).size() == 0);
          } else if (object instanceof List) {
            ((List) object).removeIf(value -> dropEmptyFields(value));
            return (((List) object).length == 0);
          }
          return false;
        }
        dropEmptyFields(ctx);
  - script:
      description: Convert Additional Info keys to snake case.
      tag: additional-info-keys-to-snake-case
      lang: painless
      source: |
        Map keysToSnakeCase(Map m) {
          def regex = /_?([a-z])([A-Z]+)/;
          def snakeCaseMap = [:];
          for (entry in m.entrySet()) {
            def k = entry.getKey();
            def v = entry.getValue();
            if (v instanceof Map) {
              v = keysToSnakeCase(v);
            } else if (v instanceof List) {
              for (int i = 0; i < v.size(); i++) {
                def item = v.get(i);
                if (item instanceof Map) {
                  v.set(i, keysToSnakeCase(item));
                }
              }
            }
            k = regex.matcher(k).replaceAll('$1_$2').toLowerCase();
            snakeCaseMap.put(k, v);
          }
          return snakeCaseMap;
        }
        if (ctx.sailpoint_identity_security_cloud.event != null) {
          ctx.sailpoint_identity_security_cloud.event = keysToSnakeCase(ctx.sailpoint_identity_security_cloud.event);
        }
##################### ECS Fields #####################
  - set:
      field: ecs.version
      value: '8.11.0'

  - set:
      field: event.kind
      value: event

  - append:
      field: event.category
      value: iam

  - append:
      field: event.type
      value: info

  - set:
      field: event.dataset
      value: sailpoint_identity_security_cloud.event

  - set:
      field: event.module
      value: sailpoint_identity_security_cloud

  - set:
      field: event.id
      copy_from: ctx.sailpoint_identity_security_cloud.event.id
      ignore_empty_value: true


  - set:
      field: user.name
      value: "{{{sailpoint_identity_security_cloud.event.actor.name}}}"
      ignore_empty_value: true

  - append:
      field: related.user
      value: "{{{sailpoint_identity_security_cloud.event.actor.name}}}"  
      allow_duplicates: false

  - append:
      field: related.hosts
      value: "{{{sailpoint_identity_security_cloud.event.ipaddress}}}"
      allow_duplicates: false
      if: ctx.sailpoint_identity_security_cloud.event?.ipaddress != null && ctx.sailpoint_identity_security_cloud.event.ipaddress != ''

  - append:
      field: related.hosts
      value: "{{{sailpoint_identity_security_cloud.event.attributes.host_name}}}"
      allow_duplicates: false   
      if: ctx.sailpoint_identity_security_cloud.event?.host_name != null && ctx.sailpoint_identity_security_cloud.event.host_name != '' 
 #################### Override host.ip ######################
  - convert:
      field: sailpoint_identity_security_cloud.event.host_name
      type: ip
      if: ctx.sailpoint_identity_security_cloud.event?.host_name != null && ctx.sailpoint_identity_security_cloud.event.host_name != ''
      ignore_failure: true 
      ignore_missing: true

  - set:
      field: host.ip
      copy_from : ctx.sailpoint_identity_security_cloud.event.host_name
      ignore_empty_value: true

  - geoip:
      field: host.ip
      target_field: host.geo
      ignore_missing: true
      ignore_failure: true
################### Set @timestamp ##########################
  - set:
     field: "@timestamp"
     copy_from: ctx.sailpoint_identity_security_cloud.event.created
     ignore_empty_value: true
 ################### Error Log fields ###################
on_failure:
  - append:
      field: error.message
      value: '{{{_ingest.on_failure_message}}}'
  - set:
      field: event.kind
      value: pipeline_error
