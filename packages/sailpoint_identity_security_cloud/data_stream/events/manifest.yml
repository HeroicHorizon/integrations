title: "Events"
type: logs
streams:
  - input: cel
    title: Sailpoint identity security cloud Events
    description: Sailpoint identity security cloud Request Settings
    enabled: true
    template_path: cel.yml.hbs
    vars:
      - name: interval
        type: text
        title: Interval
        description: Data for all managed accounts will be re-fetched at this interval
        show_user: false
        required: true
        default: "1h"
      - name: limit
        type: integer
        title: Limit
        description: Number of events to fetch per request
        show_user: true
        required: true
        default: 1000
      - name: initial_interval
        type: text
        title: Initial Interval
        multi: false
        required: true
        show_user: false
        default: "2160h"
      - name: tags
        type: text
        title: Tags
        multi: true
        show_user: true
